name: CI

on:
  push:    
  pull_request:

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/optimization-api

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3️⃣ Build Docker image with SHA tag
      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      # 4️⃣ Run tests inside Docker image with coverage
      - name: Run tests in Docker
        run: docker run --rm $IMAGE_NAME:${{ github.sha }} pytest --cov=app

      # 5️⃣ Tag image as latest
      - name: Tag image as latest
        run: docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:latest

      # 6️⃣ Push both SHA and latest tags
      - name: Push Docker images
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest