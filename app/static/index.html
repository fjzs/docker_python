<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facility Location Problem Optimizer</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Facility Location Problem Optimizer</h1>
        <p class="description">
            Optimize the placement of facilities to serve customers efficiently.
            Generate a random problem instance on a 100×100 unit grid, then solve it.
        </p>

        <div class="form-container">
            <h2>Generate New Instance</h2>
            <form id="generateForm">
                <div class="form-group">
                    <label for="n_customers">Number of Customers:</label>
                    <input
                        type="number"
                        id="n_customers"
                        name="n_customers"
                        min="1"
                        max="1000"
                        value="10"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="n_facilities">Number of Facilities:</label>
                    <input
                        type="number"
                        id="n_facilities"
                        name="n_facilities"
                        min="1"
                        max="1000"
                        value="3"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="opening_cost">Facility Opening Cost:</label>
                    <input
                        type="number"
                        id="opening_cost"
                        name="opening_cost"
                        min="1"
                        value="10"
                        required
                    >
                </div>

                <button type="submit" class="btn-generate">Generate Instance</button>
            </form>
        </div>

        <div id="resultContainer" class="result-container" style="display: none;">
            <h2>Problem Instance</h2>
            <div id="resultData" class="result-data">
                <!-- Generated data will be displayed here -->
            </div>
            <button id="solveButton" class="btn-solve" style="display: none;">
                Solve instance randomly
            </button>
            <button id="solveOptimallyButton" class="btn-solve-optimally" style="display: none;">
                Solve instance optimally
            </button>

            <div id="costSummary" class="cost-summary" style="display: none;">
                <h3>Solution Costs</h3>
                <div class="cost-grid">
                    <div class="cost-item">
                        <span class="cost-label">Transportation Cost</span>
                        <span class="cost-value" id="transportationCost">-</span>
                    </div>
                    <div class="cost-item">
                        <span class="cost-label">Facility Opening Cost</span>
                        <span class="cost-value" id="facilityCost">-</span>
                    </div>
                    <div class="cost-item total">
                        <span class="cost-label">Total Cost</span>
                        <span class="cost-value" id="totalCost">-</span>
                    </div>
                </div>
            </div>

            <canvas id="gridCanvas" width="500" height="500" class="grid-canvas"></canvas>
        </div>

        <div id="errorContainer" class="error-container" style="display: none;">
            <p id="errorMessage"></p>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
